<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="./js/map.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
    <title>Mapa</title>
</head>

<style>
    :root {
        --color-text: #1869ab;
        --color-shadow: #363949;
        --color-background: #ffffff;
        --card-border-radius: 1rem;
        --card-padding: 1.1rem 1rem;
        --box-shadow: 0.2rem 0.2rem 1rem #363949;
    }

    * {
        margin: 0;
        padding: 0;
        outline: 0;
        border: 0;
        box-sizing: border-box;
    }

    @font-face {
        font-family: 'minha-fonte';
        src: url('../fonts/PlaypenSans-Regular.ttf') format('woff2');
    }

    body {
        font-family: 'minha-fonte', sans-serif;
        font-size: 0.88rem;
        background: var(--color-background);
        font-size: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100vh;

    }

    .fundo_fixo {
        position: fixed;
        top: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        gap: 0.5vw;
        background-color: #1869ab;
        border-radius: 0 0 4vw 4vw;
        height: 40vh;
        width: 100%;
        padding: 2vw 0;
    }

    .container {
        display: grid;
        width: 97%;
        gap: 1.6rem;
        grid-template-columns: auto;
        z-index: 100;
    }

    .analyse {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 1.6rem;
    }

    .analyse>div {
        background-color: var(--color-background);
        color: var(--color-text);
        padding: var(--card-padding);
        border-radius: var(--card-border-radius);
        box-shadow: var(--box-shadow);
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        text-align: left;
        height: 8vw;
    }

    .kpi_header {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;

        .material-symbols-outlined {
            font-size: 2vw;
        }
    }

    .analyse h3 {
        margin-left: 0.6rem;
        font-size: 1rem;
    }

    .charts-container {
        height: 70vh;
        display: flex;
        justify-content: space-between;
        flex-direction: row;
        gap: 1.6rem;

        .first-line {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.6rem;
            width: 50%;

            .line-chart {
                grid-column: span 2;
            }
        }

        .second-line {
            width: 50%;

            .chart_card {
                height: 100%;
            }

            iframe {
                width: 100%;
                height: 95%;
            }
        }

    }

    .chart_card {
        background-color: var(--color-background);
        color: var(--color-text);
        border-radius: var(--card-border-radius);
        box-shadow: var(--box-shadow);
        padding: 0.5vw;

    }

    #map {
        width: 100%;
        height: 100%;
        border-radius: 1vw;
    }


    /* ----------------------------------------------------------------------- */

    @media screen and (max-width: 768px),
    screen and (orientation: portrait) {

        #map {
            height: 40vh;
            border-radius: 1vw;
        }

        .container {
            width: 100%;
            height: 100vh;
            grid-template-columns: 1fr;
            padding: 3vw;
            user-select: none;
        }


        .analyse {
            grid-template-columns: 1fr;
            gap: 5vw;

        }

        .analyse>div {
            height: 20vw;
        }

        .kpi_header {
            .material-symbols-outlined {
                font-size: 8vw;
            }
        }

        .charts-container {
            height: auto;
            display: flex;
            justify-content: space-between;
            flex-direction: column;
            gap: 1.6rem;

            .first-line {
                display: flex;
                flex-direction: column;
                gap: 1.6rem;
                width: 100%;

                .chart_card {
                    height: auto;
                    padding: 3vw;
                }

                .line-chart {
                    height: auto;
                    padding: 3vw;
                }
            }

            .second-line {
                width: 100%;
                margin-bottom: 5vw;

                .chart_card {
                    min-height: 40vh;
                    height: auto;
                    padding: 3vw;
                }

            }

        }

    }
</style>

<body>

    <div class="fundo_fixo">


    </div>

    <div class="container">

        <div class="analyse">

            <div>

                <div class="kpi_header">

                    <h3>Motoristas</h3>

                    <span class="material-symbols-outlined" style="color: rgb(223, 8, 223);">person</span>


                </div>

                <h1 id="qtd_user">-</h1>

            </div>


            <div>

                <div class="kpi_header">

                    <h3>Online</h3>

                    <span class="material-symbols-outlined" style="color: rgb(5, 218, 40);">check_circle</span>

                </div>

                <h1 id="qtd_online">0</h1>

            </div>

            <div>

                <div class="kpi_header">

                    <h3>Em Rota</h3>

                    <span class="material-symbols-outlined" style="color: rgb(1, 224, 195);">speed_3</span>

                </div>

                <h1 id="em_rota">-</h1>

            </div>


            <div>

                <div class="kpi_header">

                    <h3>QTD Entregas</h3>

                    <span class="material-symbols-outlined" style="color: rgb(5, 218, 40);">alarm_on</span>

                </div>


                <h1 id="">-</h1>

            </div>

            <div>

                <div class="kpi_header">

                    <h3>Atrasados</h3>

                    <span class="material-symbols-outlined" style="color: rgb(238, 32, 4);">alarm_off</span>

                </div>


                <h1 id="">-</h1>

            </div>


        </div>


        <div class="charts-container">

            <div class="first-line">

                <div class="chart_card">

                    <h3>Gráfico 1</h3>

                    <div id="pie" style="width: 100%; height: 100%;"></div>


                </div>

                <div class="chart_card">

                    <h3>Gráfico 2</h3>

                    <div id="bar_saida" style="width: 100%; height: 100%;"></div>


                </div>

                <div class="chart_card line-chart">

                    <h3>Gráfico 3</h3>

                    <div id="line" style="width: 100%; height: 100%;"></div>


                </div>


            </div>


            <div class="second-line">


                <div class="chart_card">


                    <div id="map"></div>


                </div>

            </div>

        </div>

    </div>

</body>


</html>
