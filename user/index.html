<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./placeholder.png" type="image/x-icon">
    <link rel="stylesheet" href="index.css">
    <title>Login</title>
</head>

<body>

    <div class="modal">

        <div id="spinner">

            <div id="loading"></div>


        </div>

        <h1>Bem Vindo!</h1>

        <div class="imagem">

            <img src="./globoimg.png" alt="" id="globo-img">

        </div>

        <div class="form">

            <label for="nome">Usuário:</label>

            <input type="text" placeholder="Digite seu Usuário" id="nome">

            <label for="nome">Senha:</label>

            <input type="password" placeholder="*****" id="senha">

            <div id="mensagem"></div>


            <button id="start-btn" onclick="login()">Entrar</button>

        </div>

    </div>


    <script>
        async function login() {
            const user = document.getElementById('nome').value;
            const password = document.getElementById('senha').value;
            const spinner = document.getElementById('spinner');

            spinner.style.display = 'flex';

            const response = await fetch('https://api-checkin-7zte.onrender.com/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ user, password })
            });

            const data = await response.json();
            const msg = document.getElementById('mensagem');

            if (response.ok) {
                localStorage.setItem('nome', user);
                sessionStorage.setItem('logon', 'ok')
                window.location.href = "home.html";

            } else {
                spinner.style.display = 'none';
                msg.innerHTML = `${data.error}`;
            }
        }


    </script>

</body>

</html>
